name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci

      - name: Generate sample data
        run: make sample-data

      - name: Run ETL
        run: make etl

      - name: Data quality
        run: make dq

      - name: Evaluate
        run: make evaluate

      - name: Test
        run: make test

      - name: Build Next.js app
        run: make build
