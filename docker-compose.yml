services:
  api:
    build: .
    command: >
      sh -c "make sample-data && make etl &&
             uvicorn nyc_taxi_mobility_analytics.api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  app:
    build: .
    command: >
      sh -c "make sample-data && make etl &&
             streamlit run src/nyc_taxi_mobility_analytics/dashboard.py
             --server.address 0.0.0.0 --server.port 8501 --server.headless true"
    ports:
      - "8501:8501"

